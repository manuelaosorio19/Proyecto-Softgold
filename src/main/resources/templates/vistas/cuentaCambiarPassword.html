<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{plantillas/principal :: head}"></head>
<body>
<header th:replace="~{plantillas/principal :: header}"></header>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">

            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/cuenta/perfil}">Mi Cuenta</a></li>
                    <li class="breadcrumb-item active">Cambiar Contraseña</li>
                </ol>
            </nav>

            <div class="card border-0 shadow-sm">
                <div class="card-header sg-card-header d-flex align-items-center gap-2">
                    <i class="bi bi-key-fill fs-5 text-warning"></i>
                    <div>
                        <h5 class="mb-0 fw-bold">Cambiar Contraseña</h5>
                        <small class="text-muted">Actualiza tu contraseña de acceso</small>
                    </div>
                </div>
                <div class="card-body p-4">

                    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <i class="bi bi-check-circle me-1"></i>
                        <span th:text="${exito}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        <span th:text="${error}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form id="formCambioPassword" th:action="@{/cuenta/cambiarPassword}" method="post" novalidate>

                        <div class="mb-3">
                            <label for="passwordActual" class="form-label fw-semibold">
                                Contraseña actual <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="passwordActual"
                                       name="passwordActual" required placeholder="Tu contraseña actual">
                                <button class="btn btn-outline-secondary" type="button" id="toggleActual" tabindex="-1">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback" id="errorActual"></div>
                        </div>

                        <div class="mb-3">
                            <label for="passwordNueva" class="form-label fw-semibold">
                                Nueva contraseña <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="passwordNueva"
                                       name="passwordNueva" required placeholder="Mínimo 8 caracteres">
                                <button class="btn btn-outline-secondary" type="button" id="toggleNueva" tabindex="-1">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <!-- Indicador de fortaleza -->
                            <div class="mt-2" id="strengthBar" style="display:none;">
                                <div class="progress" style="height:6px;">
                                    <div class="progress-bar" id="strengthFill" role="progressbar" style="width:0%;transition:width .3s,background-color .3s;"></div>
                                </div>
                                <small id="strengthLabel" class="text-muted"></small>
                            </div>
                            <!-- Requisitos -->
                            <ul class="list-unstyled small mt-2 mb-0" id="reqList">
                                <li id="req-len"><i class="bi bi-x-circle text-danger me-1"></i>Al menos 8 caracteres</li>
                                <li id="req-upper"><i class="bi bi-x-circle text-danger me-1"></i>Al menos una mayúscula</li>
                                <li id="req-num"><i class="bi bi-x-circle text-danger me-1"></i>Al menos un número</li>
                            </ul>
                            <div class="invalid-feedback" id="errorNueva"></div>
                        </div>

                        <div class="mb-4">
                            <label for="passwordConfirmar" class="form-label fw-semibold">
                                Confirmar nueva contraseña <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="passwordConfirmar"
                                       required placeholder="Repite la nueva contraseña">
                                <button class="btn btn-outline-secondary" type="button" id="toggleConfirmar" tabindex="-1">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback" id="errorConfirmar"></div>
                        </div>

                        <div class="d-flex gap-2 justify-content-end">
                            <a th:href="@{/cuenta/perfil}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-1"></i>Cancelar
                            </a>
                            <button type="submit" class="btn btn-success px-4" id="btnGuardar">
                                <i class="bi bi-check-lg me-1"></i>Actualizar Contraseña
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{plantillas/principal :: footer}"></footer>

<script>
(function () {
    function toggleVer(btnId, inputId) {
        document.getElementById(btnId).addEventListener('click', function () {
            const inp = document.getElementById(inputId);
            const icon = this.querySelector('i');
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                inp.type = 'password';
                icon.className = 'bi bi-eye';
            }
        });
    }
    toggleVer('toggleActual', 'passwordActual');
    toggleVer('toggleNueva', 'passwordNueva');
    toggleVer('toggleConfirmar', 'passwordConfirmar');

    const inp = document.getElementById('passwordNueva');
    const bar = document.getElementById('strengthBar');
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    const reqLen = document.getElementById('req-len');
    const reqUpper = document.getElementById('req-upper');
    const reqNum = document.getElementById('req-num');

    function markReq(el, ok) {
        const icon = el.querySelector('i');
        icon.className = ok ? 'bi bi-check-circle text-success me-1' : 'bi bi-x-circle text-danger me-1';
    }

    inp.addEventListener('input', function () {
        const v = this.value;
        bar.style.display = v.length > 0 ? '' : 'none';

        const len = v.length >= 8;
        const upper = /[A-Z]/.test(v);
        const num = /\d/.test(v);
        markReq(reqLen, len);
        markReq(reqUpper, upper);
        markReq(reqNum, num);

        const score = [len, upper, num, v.length >= 12, /[^A-Za-z0-9]/.test(v)].filter(Boolean).length;
        const levels = [
            { pct: 20, color: '#dc3545', text: 'Muy débil' },
            { pct: 40, color: '#fd7e14', text: 'Débil' },
            { pct: 60, color: '#ffc107', text: 'Moderada' },
            { pct: 80, color: '#20c997', text: 'Fuerte' },
            { pct: 100, color: '#198754', text: 'Muy fuerte' },
        ];
        const lv = levels[score - 1] || levels[0];
        fill.style.width = lv.pct + '%';
        fill.style.backgroundColor = lv.color;
        label.textContent = lv.text;
        label.style.color = lv.color;
    });

    document.getElementById('formCambioPassword').addEventListener('submit', function (e) {
        const nueva = document.getElementById('passwordNueva').value;
        const confirmar = document.getElementById('passwordConfirmar').value;
        let valid = true;

        if (nueva.length < 8) {
            document.getElementById('passwordNueva').classList.add('is-invalid');
            document.getElementById('errorNueva').textContent = 'La contraseña debe tener al menos 8 caracteres';
            valid = false;
        } else {
            document.getElementById('passwordNueva').classList.remove('is-invalid');
        }

        if (nueva !== confirmar) {
            document.getElementById('passwordConfirmar').classList.add('is-invalid');
            document.getElementById('errorConfirmar').textContent = 'Las contraseñas no coinciden';
            valid = false;
        } else {
            document.getElementById('passwordConfirmar').classList.remove('is-invalid');
        }

        if (!valid) e.preventDefault();
    });
})();
</script>
</body>
</html>
