<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{plantillas/principal :: head}"></head>
<body>
<header th:replace="~{plantillas/principal :: header}"></header>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin}">Panel</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/admin/riesgos}">Riesgos</a></li>
                    <li class="breadcrumb-item active">Editar Riesgo</li>
                </ol>
            </nav>

            <div class="card border-0 shadow-sm">
                <div class="card-header sg-card-header d-flex align-items-center gap-2">
                    <i class="bi bi-pencil-square fs-5 text-warning"></i>
                    <h5 class="mb-0 fw-bold">Editar Riesgo
                        <span class="badge bg-danger ms-2" th:text="'#' + ${riesgo.codRiesgo}"></span>
                    </h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/riesgos/editar/{id}(id=${riesgo.codRiesgo})}"
                          th:object="${riesgo}" method="post">

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Descripción del Riesgo <span class="text-danger">*</span>
                            </label>
                            <textarea th:field="*{descripcion}" class="form-control" rows="4" required
                                      maxlength="500"
                                      placeholder="Describe el tipo de riesgo..."></textarea>
                            <div th:if="${#fields.hasErrors('descripcion')}" class="text-danger small mt-1">
                                <span th:errors="*{descripcion}"></span>
                            </div>
                        </div>

                        <div th:if="${riesgo.minas != null and !riesgo.minas.isEmpty()}" class="mb-3">
                            <label class="form-label fw-semibold small text-muted">Minas que tienen este riesgo</label>
                            <div class="d-flex flex-wrap gap-2">
                                <span th:each="mina : ${riesgo.minas}"
                                      class="badge bg-warning text-dark rounded-pill px-3 py-2">
                                    <i class="bi bi-gem me-1"></i>
                                    <span th:text="${mina.nombre}"></span>
                                </span>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-warning px-4">
                                <i class="bi bi-check-lg me-1"></i>Actualizar Riesgo
                            </button>
                            <a th:href="@{/admin/riesgos}" class="btn btn-outline-secondary px-4">
                                <i class="bi bi-arrow-left me-1"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<footer th:replace="~{plantillas/principal :: footer}"></footer>
</body>
</html>
