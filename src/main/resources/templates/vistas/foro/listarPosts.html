<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{plantillas/principal :: head}"></head>
<body>
<header th:replace="~{plantillas/principal :: header}"></header>

<main class="container mt-4">
    <!-- Encabezado -->
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
        <div>
            <h2 class="fw-bold mb-1"><i class="bi bi-chat-dots-fill text-primary me-2"></i>Foro y Discusiones</h2>
            <p class="text-muted mb-0">Comunidad SoftGold — comparte y consulta con el equipo.</p>
        </div>
        <a th:href="@{/foro/crear}" class="btn btn-success rounded-pill px-4">
            <i class="bi bi-plus-lg me-1"></i>Nuevo Post
        </a>
    </div>

    <!-- Mensajes flash -->
    <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" th:text="${mensajeExito}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filtros por categoría -->
    <div class="d-flex flex-wrap gap-2 mb-4">
        <a th:href="@{/foro}" class="btn btn-sm rounded-pill"
           th:classappend="${categoriaActiva == null} ? ' btn-primary' : ' btn-outline-secondary'">
            Todas
        </a>
        <a th:each="cat : ${categorias}" th:href="@{/foro(categoria=${cat})}"
           class="btn btn-sm rounded-pill"
           th:classappend="${categoriaActiva == cat} ? ' btn-primary' : ' btn-outline-secondary'"
           th:text="${cat}"></a>
    </div>

    <!-- Barra de búsqueda -->
    <form th:action="@{/foro}" method="get" class="mb-4">
        <div class="input-group">
            <input type="text" name="buscar" class="form-control" placeholder="Buscar posts..."
                   th:value="${buscar}">
            <button type="submit" class="btn btn-outline-success">
                <i class="bi bi-search"></i>
            </button>
        </div>
    </form>

    <!-- Lista de posts -->
    <div th:if="${posts != null and !posts.isEmpty()}">
        <div th:each="post : ${posts}" class="card border-0 shadow-sm mb-3 sg-forum-card">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-start gap-2 flex-wrap">
                    <div class="flex-grow-1">
                        <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
                            <span class="badge sg-badge-categoria rounded-pill"
                                  th:classappend="'bg-cat-' + ${post.categoria?.toLowerCase()}"
                                  th:text="${post.categoria}">GENERAL</span>
                            <small class="text-muted">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${#temporals.format(post.fechaCreacion, 'dd/MM/yyyy HH:mm')}"></span>
                            </small>
                        </div>
                        <h5 class="fw-bold mb-1">
                            <a th:href="@{/foro/{id}(id=${post.id})}" class="text-decoration-none text-body"
                               th:text="${post.titulo}"></a>
                        </h5>
                        <p class="text-muted mb-2 sg-post-preview"
                           th:text="${#strings.abbreviate(post.contenido, 150)}"></p>
                        <div class="d-flex align-items-center gap-3 small text-muted">
                            <span>
                                <i class="bi bi-person-circle me-1"></i>
                                <span th:text="${post.autorNombre != null ? post.autorNombre : 'Anónimo'}"></span>
                            </span>
                            <span>
                                <i class="bi bi-chat me-1"></i>
                                <span th:text="${post.comentarios != null ? post.comentarios.size() : 0}"></span> comentarios
                            </span>
                        </div>
                    </div>
                    <div class="d-flex flex-column gap-1">
                        <a th:href="@{/foro/{id}(id=${post.id})}" class="btn btn-outline-primary btn-sm">
                            <i class="bi bi-eye me-1"></i>Ver
                        </a>
                        <a th:if="${isAdmin}" th:href="@{/foro/eliminar/{id}(id=${post.id})}"
                           class="btn btn-outline-danger btn-sm"
                           onclick="return confirm('¿Eliminar este post?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${posts == null or posts.isEmpty()}" class="text-center py-5">
        <i class="bi bi-chat-square-text fs-1 text-muted d-block mb-3"></i>
        <h5 class="text-muted">No hay posts todavía</h5>
        <p class="text-muted">¡Sé el primero en publicar algo!</p>
        <a th:href="@{/foro/crear}" class="btn btn-success rounded-pill px-4">
            <i class="bi bi-plus-lg me-1"></i>Crear primer post
        </a>
    </div>
</main>

<footer th:replace="~{plantillas/principal :: footer}"></footer>
</body>
</html>
