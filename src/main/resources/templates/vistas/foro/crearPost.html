<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{plantillas/principal :: head}"></head>
<body>
<header th:replace="~{plantillas/principal :: header}"></header>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/foro}">Foro</a></li>
                    <li class="breadcrumb-item active">Nuevo Post</li>
                </ol>
            </nav>

            <div class="card shadow-sm border-0">
                <div class="card-header sg-card-header d-flex align-items-center gap-2">
                    <i class="bi bi-pencil-square fs-5 text-primary"></i>
                    <h5 class="mb-0 fw-bold">Crear Nuevo Post</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/foro/crear}" th:object="${post}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Título <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{titulo}" class="form-control"
                                   placeholder="¿Sobre qué quieres hablar?" required maxlength="200">
                            <div th:if="${#fields.hasErrors('titulo')}" class="text-danger small mt-1">
                                <span th:errors="*{titulo}"></span>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Categoría</label>
                            <select th:field="*{categoria}" class="form-select">
                                <option th:each="cat : ${categorias}" th:value="${cat}" th:text="${cat}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contenido <span class="text-danger">*</span></label>
                            <textarea th:field="*{contenido}" class="form-control" rows="8" required
                                      maxlength="5000" placeholder="Escribe el contenido de tu post..."></textarea>
                            <div class="d-flex justify-content-between mt-1">
                                <div th:if="${#fields.hasErrors('contenido')}" class="text-danger small">
                                    <span th:errors="*{contenido}"></span>
                                </div>
                                <small class="text-muted ms-auto" id="charCount">0 / 5000</small>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success px-4">
                                <i class="bi bi-send me-1"></i>Publicar
                            </button>
                            <a th:href="@{/foro}" class="btn btn-outline-secondary px-4">
                                <i class="bi bi-arrow-left me-1"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{plantillas/principal :: footer}"></footer>
<script>
    const textarea = document.querySelector('textarea');
    const counter = document.getElementById('charCount');
    if (textarea && counter) {
        textarea.addEventListener('input', () => { counter.textContent = textarea.value.length + ' / 5000'; });
    }
</script>
</body>
</html>
