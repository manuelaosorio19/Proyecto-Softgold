<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{plantillas/principal :: head}"></head>
<body>
<header th:replace="~{plantillas/principal :: header}"></header>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin}">Panel</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/admin/riesgos}">Riesgos</a></li>
                    <li class="breadcrumb-item active">Nuevo Riesgo</li>
                </ol>
            </nav>

            <div class="card border-0 shadow-sm">
                <div class="card-header sg-card-header d-flex align-items-center gap-2">
                    <i class="bi bi-exclamation-triangle-fill fs-5 text-danger"></i>
                    <h5 class="mb-0 fw-bold">Registrar Nuevo Riesgo</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/riesgos/crear}" th:object="${riesgo}" method="post">

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Descripción del Riesgo <span class="text-danger">*</span>
                            </label>
                            <textarea th:field="*{descripcion}" class="form-control" rows="4" required
                                      maxlength="500"
                                      placeholder="Describe el tipo de riesgo (ej: Riesgo de derrumbe por inestabilidad del terreno)..."></textarea>
                            <div th:if="${#fields.hasErrors('descripcion')}" class="text-danger small mt-1">
                                <span th:errors="*{descripcion}"></span>
                            </div>
                            <div class="form-text">Máximo 500 caracteres. Sea específico sobre la naturaleza del riesgo.</div>
                        </div>

                        <div class="alert alert-warning py-2 small">
                            <i class="bi bi-info-circle me-1"></i>
                            Después de crear el riesgo, puedes asociarlo a minas desde la edición de cada mina.
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-danger px-4">
                                <i class="bi bi-check-lg me-1"></i>Guardar Riesgo
                            </button>
                            <a th:href="@{/admin/riesgos}" class="btn btn-outline-secondary px-4">
                                <i class="bi bi-arrow-left me-1"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<footer th:replace="~{plantillas/principal :: footer}"></footer>
</body>
</html>
