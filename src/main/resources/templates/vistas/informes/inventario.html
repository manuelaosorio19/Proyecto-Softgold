<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{plantillas/principal :: head}"></head>
<body>
<header th:replace="~{plantillas/principal :: header}"></header>

<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <div>
            <h2 class="fw-bold mb-1"><i class="bi bi-boxes text-info me-2"></i>Inventario General</h2>
            <p class="text-muted mb-0">Resumen de todos los recursos registrados.</p>
        </div>
        <a th:href="@{/admin/informes}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Dashboard
        </a>
    </div>

    <!-- KPIs -->
    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-4 sg-kpi-card">
                <i class="bi bi-gem fs-2 text-warning mb-2"></i>
                <div class="display-5 fw-bold" th:text="${totalMinas}">0</div>
                <small class="text-muted">Minas Registradas</small>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-4 sg-kpi-card">
                <i class="bi bi-map fs-2 text-success mb-2"></i>
                <div class="display-5 fw-bold" th:text="${totalMapas}">0</div>
                <small class="text-muted">Mapas Registrados</small>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm text-center p-4 sg-kpi-card">
                <i class="bi bi-geo-alt fs-2 text-primary mb-2"></i>
                <div class="display-5 fw-bold" th:text="${totalZonas}">0</div>
                <small class="text-muted">Zonas de Exploración</small>
            </div>
        </div>
    </div>

    <!-- Tablas en pestañas -->
    <ul class="nav nav-tabs mb-3" id="inventarioTabs">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabMinas">
                <i class="bi bi-gem me-1"></i>Minas (<span th:text="${totalMinas}"></span>)
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabMapas">
                <i class="bi bi-map me-1"></i>Mapas (<span th:text="${totalMapas}"></span>)
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabZonas">
                <i class="bi bi-geo-alt me-1"></i>Zonas (<span th:text="${totalZonas}"></span>)
            </button>
        </li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="tabMinas">
            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="sg-table-header">
                            <tr><th class="ps-4">Nombre</th><th>Departamento</th><th>Mapas</th><th>Riesgos</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="m : ${minas}">
                                <td class="ps-4 fw-semibold" th:text="${m.nombre}"></td>
                                <td th:text="${m.departamento}"></td>
                                <td><span class="badge bg-success" th:text="${m.mapas != null ? m.mapas.size() : 0}"></span></td>
                                <td><span class="badge bg-danger" th:text="${m.riesgos != null ? m.riesgos.size() : 0}"></span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="tab-pane fade" id="tabMapas">
            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="sg-table-header">
                            <tr><th class="ps-4">Descripción</th><th>Coordenadas</th><th>Latitud</th><th>Longitud</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="m : ${mapas}">
                                <td class="ps-4 fw-semibold" th:text="${m.descripcion}"></td>
                                <td class="small text-muted" th:text="${m.coordenadas}"></td>
                                <td class="small" th:text="${m.latitud != null ? m.latitud : '—'}"></td>
                                <td class="small" th:text="${m.longitud != null ? m.longitud : '—'}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="tab-pane fade" id="tabZonas">
            <div class="card border-0 shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="sg-table-header">
                            <tr><th class="ps-4">Nombre</th><th>Tipo</th><th>Estado</th><th>Mina</th><th>Fecha</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="z : ${zonas}">
                                <td class="ps-4 fw-semibold" th:text="${z.nombre}"></td>
                                <td><span class="badge bg-secondary" th:text="${z.tipo}"></span></td>
                                <td><span class="badge bg-primary" th:text="${z.estado}"></span></td>
                                <td class="small" th:text="${z.mina != null ? z.mina.nombre : '—'}"></td>
                                <td class="small" th:text="${#temporals.format(z.fechaRegistro, 'dd/MM/yyyy')}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{plantillas/principal :: footer}"></footer>
</body>
</html>
