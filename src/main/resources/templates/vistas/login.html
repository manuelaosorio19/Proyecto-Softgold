<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{plantillas/principal :: head}"></head>
<body class="sg-auth-body">
<header th:replace="~{plantillas/principal :: header}"></header>

<main class="d-flex align-items-center justify-content-center" style="min-height: calc(100vh - 120px);">
    <div class="sg-auth-card shadow-lg">

        <!-- Branding -->
        <div class="sg-auth-brand text-center mb-4">
            <div class="sg-auth-logo mb-2">
                <i class="bi bi-gem display-4 text-warning"></i>
            </div>
            <h3 class="fw-bold text-success mb-0">SOFTGOLD</h3>
            <p class="text-muted small">Sistema de Gestión Minera</p>
        </div>

        <h5 class="fw-bold mb-1">Iniciar Sesión</h5>
        <p class="text-muted small mb-4">Ingresa tus credenciales para continuar</p>

        <!-- Error de login -->
        <div th:if="${param.error}" class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-circle me-1"></i>Correo o contraseña incorrectos.
        </div>
        <div th:if="${param.error == 'bloqueado'}" class="alert alert-warning py-2 small">
            <i class="bi bi-lock me-1"></i>Tu cuenta está temporalmente bloqueada.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small">
            <i class="bi bi-check-circle me-1"></i>Has cerrado sesión correctamente.
        </div>
        <div th:if="${mensaje}" class="alert alert-success py-2 small" th:text="${mensaje}"></div>

        <form method="POST" th:action="@{/login}" autocomplete="off">

            <div class="mb-3">
                <label class="form-label fw-semibold small">Correo electrónico</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="ejemplo@correo.com" required autocomplete="off">
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold small">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="••••••••" required autocomplete="off">
                    <button class="btn btn-outline-secondary" type="button" id="togglePassword" tabindex="-1">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </button>
                </div>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-success btn-lg fw-bold">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
                </button>
            </div>
        </form>

        <div class="text-center">
            <a th:href="@{/recuperar}" class="small text-muted text-decoration-none">
                <i class="bi bi-key me-1"></i>¿Olvidaste tu contraseña?
            </a>
        </div>
        <hr class="my-3">
        <div class="text-center small">
            <span class="text-muted">¿No tienes cuenta? </span>
            <a th:href="@{/registro}" class="text-success fw-semibold text-decoration-none">Regístrate aquí</a>
        </div>
    </div>
</main>

<footer th:replace="~{plantillas/principal :: footer}"></footer>

<script>
    const toggleBtn = document.getElementById('togglePassword');
    const pwdInput = document.getElementById('password');
    const icon = document.getElementById('toggleIcon');
    if (toggleBtn) {
        toggleBtn.addEventListener('click', function() {
            const isPassword = pwdInput.type === 'password';
            pwdInput.type = isPassword ? 'text' : 'password';
            icon.className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
        });
    }
</script>
</body>
</html>
