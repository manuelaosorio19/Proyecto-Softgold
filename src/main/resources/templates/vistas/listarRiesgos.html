<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{plantillas/principal :: head}"></head>
<body>
<header th:replace="~{plantillas/principal :: header}"></header>

<main class="container mt-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
        <div>
            <h2 class="fw-bold mb-1"><i class="bi bi-exclamation-triangle-fill text-danger me-2"></i>Gestión de Riesgos</h2>
            <p class="text-muted mb-0">Administra los riesgos asociados a las minas del sistema.</p>
        </div>
        <a th:href="@{/admin/riesgos/crear}" class="btn btn-danger rounded-pill px-4">
            <i class="bi bi-plus-lg me-1"></i>Nuevo Riesgo
        </a>
    </div>

    <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" th:text="${mensajeExito}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" th:text="${error}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="sg-table-header">
                        <tr>
                            <th class="ps-4">Código</th>
                            <th>Descripción del Riesgo</th>
                            <th class="text-center">Minas Asociadas</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${riesgos == null or riesgos.isEmpty()}">
                            <td colspan="4" class="text-center py-5 text-muted">
                                <i class="bi bi-shield-check fs-2 d-block mb-2 text-success"></i>
                                No hay riesgos registrados en el sistema.
                                <a th:href="@{/admin/riesgos/crear}" class="d-block mt-2">Registrar primer riesgo</a>
                            </td>
                        </tr>
                        <tr th:each="riesgo : ${riesgos}">
                            <td class="ps-4">
                                <span class="badge bg-danger rounded-pill" th:text="${riesgo.codRiesgo}"></span>
                            </td>
                            <td class="fw-semibold" th:text="${riesgo.descripcion}"></td>
                            <td class="text-center">
                                <span class="badge bg-warning text-dark rounded-pill"
                                      th:text="${riesgo.minas != null ? riesgo.minas.size() : 0}"></span>
                            </td>
                            <td class="text-center">
                                <div class="d-flex gap-1 justify-content-center">
                                    <a th:href="@{/admin/riesgos/editar/{id}(id=${riesgo.codRiesgo})}"
                                       class="btn btn-outline-warning btn-sm" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <a th:href="@{/admin/riesgos/eliminar/{id}(id=${riesgo.codRiesgo})}"
                                       class="btn btn-outline-danger btn-sm" title="Eliminar"
                                       onclick="return confirm('¿Eliminar este riesgo? Se desvinculará de todas las minas.')">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{plantillas/principal :: footer}"></footer>
</body>
</html>
