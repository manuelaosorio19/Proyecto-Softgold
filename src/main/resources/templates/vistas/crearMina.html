<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{plantillas/principal :: head}"></head>
<body>
<header th:replace="~{plantillas/principal :: header}"></header>

<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a th:href="@{/admin}">Panel</a></li>
                    <li class="breadcrumb-item"><a th:href="@{/admin/minas}">Minas</a></li>
                    <li class="breadcrumb-item active">Nueva Mina</li>
                </ol>
            </nav>

            <div class="card border-0 shadow-sm">
                <div class="card-header sg-card-header d-flex align-items-center gap-2">
                    <i class="bi bi-gem fs-5 text-warning"></i>
                    <h5 class="mb-0 fw-bold">Registrar Nueva Mina</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/minas/crear}" th:object="${mina}" method="post">
                        <input type="hidden" th:field="*{codMina}" />

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    Nombre <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{nombre}" class="form-control" required
                                       placeholder="Nombre de la mina">
                                <div th:if="${#fields.hasErrors('nombre')}" class="text-danger small mt-1">
                                    <span th:errors="*{nombre}"></span>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    Departamento <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{departamento}" class="form-control" required
                                       placeholder="Ej: Antioquia, Chocó">
                                <div th:if="${#fields.hasErrors('departamento')}" class="text-danger small mt-1">
                                    <span th:errors="*{departamento}"></span>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">
                                    Mapas Asociados
                                </label>
                                <div th:if="${mapas == null or mapas.isEmpty()}" class="alert alert-warning py-2 small">
                                    <i class="bi bi-info-circle me-1"></i>
                                    Crea al menos un mapa antes de asociarlo.
                                    <a th:href="@{/admin/mapas/crear}" class="alert-link">Crear mapa</a>
                                </div>
                                <select th:unless="${mapas == null or mapas.isEmpty()}"
                                        th:field="*{mapas}" class="form-select" multiple size="4">
                                    <option th:each="mapa : ${mapas}"
                                            th:value="${mapa.codigoMapa}"
                                            th:text="${mapa.descripcion + ' (' + mapa.coordenadas + ')'}"></option>
                                </select>
                                <div class="form-text">Mantén Ctrl para seleccionar varios.</div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Riesgos Asociados</label>
                                <div th:if="${riesgos == null or riesgos.isEmpty()}" class="alert alert-warning py-2 small">
                                    <i class="bi bi-info-circle me-1"></i>
                                    No hay riesgos registrados aún.
                                    <a th:href="@{/admin/riesgos/crear}" class="alert-link">Crear riesgo</a>
                                </div>
                                <select th:unless="${riesgos == null or riesgos.isEmpty()}"
                                        th:field="*{riesgos}" class="form-select" multiple size="4">
                                    <option th:each="riesgo : ${riesgos}"
                                            th:value="${riesgo.codRiesgo}"
                                            th:text="${riesgo.descripcion}"></option>
                                </select>
                                <div class="form-text">Mantén Ctrl para seleccionar varios.</div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-warning px-4">
                                <i class="bi bi-check-lg me-1"></i>Guardar Mina
                            </button>
                            <a th:href="@{/admin/minas}" class="btn btn-outline-secondary px-4">
                                <i class="bi bi-arrow-left me-1"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<footer th:replace="~{plantillas/principal :: footer}"></footer>
</body>
</html>
