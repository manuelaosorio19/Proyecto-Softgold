<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{plantillas/principal :: head}"></head>
<body>
<header th:replace="~{plantillas/principal :: header}"></header>

<main class="container mt-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
        <div>
            <h2 class="fw-bold mb-1"><i class="bi bi-ticket-perforated-fill text-warning me-2"></i>Tickets de Soporte</h2>
            <p class="text-muted mb-0">Gestiona las solicitudes de soporte enviadas por los usuarios.</p>
        </div>
        <div class="d-flex gap-2 align-items-center">
            <span class="badge bg-danger rounded-pill px-3 py-2">
                <i class="bi bi-circle-fill me-1 small"></i>OPEN
            </span>
            <span class="badge bg-secondary rounded-pill px-3 py-2">
                <i class="bi bi-check-circle me-1 small"></i>CLOSED
            </span>
        </div>
    </div>

    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show" th:text="${exito}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="sg-table-header">
                        <tr>
                            <th class="ps-4">#</th>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Asunto</th>
                            <th>Fecha</th>
                            <th class="text-center">Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${tickets == null or tickets.isEmpty()}">
                            <td colspan="7" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox fs-2 d-block mb-2"></i>
                                No hay tickets de soporte registrados.
                            </td>
                        </tr>
                        <tr th:each="t : ${tickets}">
                            <td class="ps-4 fw-bold text-muted small" th:text="${t.id}"></td>
                            <td class="fw-semibold" th:text="${t.nombre}"></td>
                            <td>
                                <a th:href="${'mailto:' + t.email}" class="text-decoration-none small"
                                   th:text="${t.email}"></a>
                            </td>
                            <td th:text="${t.asunto}"></td>
                            <td class="small text-muted"
                                th:text="${#temporals.format(t.creado, 'dd/MM/yyyy HH:mm')}"></td>
                            <td class="text-center">
                                <span class="badge rounded-pill"
                                      th:classappend="${t.estado == 'OPEN'} ? 'bg-danger' : 'bg-secondary'"
                                      th:text="${t.estado}"></span>
                            </td>
                            <td class="text-center">
                                <form th:if="${t.estado == 'OPEN'}"
                                      th:action="@{/soporte/tickets/{id}/cerrar(id=${t.id})}"
                                      method="post" class="d-inline">
                                    <button type="submit" class="btn btn-outline-success btn-sm"
                                            title="Cerrar ticket"
                                            onclick="return confirm('¿Cerrar este ticket?')">
                                        <i class="bi bi-check-lg me-1"></i>Cerrar
                                    </button>
                                </form>
                                <span th:if="${t.estado != 'OPEN'}" class="text-muted small">
                                    <i class="bi bi-check-circle me-1"></i>Cerrado
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Panel de descripción expandible (al hacer clic en fila) -->
    <div th:each="t : ${tickets}" th:if="${t.descripcion != null}" class="mt-2 d-none" th:id="'desc-' + ${t.id}">
        <div class="card border-0 bg-light shadow-sm p-3 small">
            <strong>Descripción:</strong> <span th:text="${t.descripcion}"></span>
        </div>
    </div>
</main>

<footer th:replace="~{plantillas/principal :: footer}"></footer>
</body>
</html>
