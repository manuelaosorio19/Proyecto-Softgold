<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{plantillas/principal :: head}"></head>
<body>
<header th:replace="~{plantillas/principal :: header}"></header>

<main class="container-fluid px-4 mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div>
            <h2 class="fw-bold mb-1"><i class="bi bi-map-fill text-success me-2"></i>Mapa de Exploración</h2>
            <p class="text-muted mb-0">Visualiza todas las zonas de exploración geolocalizadas.</p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/exploracion}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-list me-1"></i>Ver Lista
            </a>
            <a th:href="@{/admin/exploracion/crear}" class="btn btn-warning btn-sm">
                <i class="bi bi-plus me-1"></i>Nueva Zona
            </a>
        </div>
    </div>

    <!-- Leyenda -->
    <div class="d-flex gap-2 flex-wrap mb-3">
        <span class="badge bg-success px-3 py-2"><i class="bi bi-circle-fill me-1"></i>Activa</span>
        <span class="badge bg-warning text-dark px-3 py-2"><i class="bi bi-circle-fill me-1"></i>Potencial</span>
        <span class="badge bg-secondary px-3 py-2"><i class="bi bi-circle-fill me-1"></i>Inactiva</span>
        <span class="badge bg-primary px-3 py-2"><i class="bi bi-circle-fill me-1"></i>En Exploración</span>
        <span class="badge bg-info text-dark px-3 py-2"><i class="bi bi-circle-fill me-1"></i>Pendiente</span>
        <span class="badge bg-danger px-3 py-2"><i class="bi bi-circle-fill me-1"></i>Cerrada</span>
    </div>

    <div id="leafletMap" class="sg-map-full shadow-sm"></div>

    <!-- Zonas sin coordenadas -->
    <div th:if="${zonas != null}" class="mt-3">
        <div th:each="zona : ${zonas}" th:if="${zona.latitud == null}">
            <div class="alert alert-warning py-2 small mb-1">
                <i class="bi bi-geo-alt me-1"></i>
                <strong th:text="${zona.nombre}"></strong> no tiene coordenadas asignadas.
                <a th:href="@{/admin/exploracion/editar/{id}(id=${zona.id})}" class="alert-link">Asignar ubicación</a>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{plantillas/principal :: footer}"></footer>

<script th:inline="javascript">
    const ZONAS_DATA = /*[[${zonas}]]*/ [];
</script>
<script>
    const map = L.map('leafletMap').setView([4.7109, -74.0721], 6);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19
    }).addTo(map);

    const colorByTipo = {
        'ACTIVA':    '#198754',
        'POTENCIAL': '#ffc107',
        'INACTIVA':  '#6c757d'
    };
    const colorByEstado = {
        'EN_EXPLORACION': '#0d6efd',
        'PENDIENTE':      '#0dcaf0',
        'CERRADA':        '#dc3545'
    };

    function makeIcon(color) {
        const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">'
            + '<circle cx="14" cy="14" r="11" fill="' + color + '" fill-opacity="0.9" stroke="#fff" stroke-width="2.5"/>'
            + '</svg>';
        return L.divIcon({
            html: svg,
            className: '',
            iconSize: [28, 28],
            iconAnchor: [14, 14],
            popupAnchor: [0, -16]
        });
    }

    if (Array.isArray(ZONAS_DATA)) {
        ZONAS_DATA.forEach(function(zona) {
            if (zona.latitud && zona.longitud) {
                const color = colorByTipo[zona.tipo] || colorByEstado[zona.estado] || '#0d6efd';
                const marker = L.marker([zona.latitud, zona.longitud], { icon: makeIcon(color) }).addTo(map);

                const minaNombre = zona.mina ? zona.mina.nombre : '—';
                const popupHtml =
                    '<div style="min-width:190px;font-family:Montserrat,sans-serif">'
                    + '<strong class="d-block mb-1">' + zona.nombre + '</strong>'
                    + '<span class="badge bg-secondary me-1">' + (zona.tipo || '') + '</span>'
                    + '<span class="badge bg-primary">' + (zona.estado || '') + '</span>'
                    + (zona.descripcion ? '<p class="mt-2 mb-1 small">' + zona.descripcion + '</p>' : '')
                    + '<small class="text-muted">Mina: ' + minaNombre + '</small><br>'
                    + '<a href="/admin/exploracion/editar/' + zona.id + '" '
                    + 'class="btn btn-sm btn-outline-primary mt-2 w-100">Editar zona</a>'
                    + '</div>';

                marker.bindPopup(popupHtml);
            }
        });
    }
</script>
</body>
</html>
