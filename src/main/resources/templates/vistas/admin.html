<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{plantillas/principal :: head}"></head>
<body>
<header th:replace="~{plantillas/principal :: header}"></header>

<main class="d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="text-center px-3">
        <div class="sg-home-logo mb-4">
            <i class="bi bi-gem" style="font-size: 5rem; color: var(--sg-warning);"></i>
        </div>
        <h1 class="fw-bold mb-2" style="font-size: 2.8rem; letter-spacing: 4px; color: var(--sg-primary);">SOFTGOLD</h1>
        <p class="text-muted fs-5 mb-1">Sistema de Gestión Minera</p>
        <p class="text-muted small mb-4">
            Bienvenido, <strong th:text="${usuario != null} ? ${usuario.nombre1} : ${currentUsername}">Administrador</strong>
        </p>
        <span class="badge bg-success px-4 py-2 rounded-pill fs-6">
            <i class="bi bi-shield-check me-1"></i>Panel de Administración
        </span>
    </div>
</main>

<footer th:replace="~{plantillas/principal :: footer}"></footer>
</body>
</html>
